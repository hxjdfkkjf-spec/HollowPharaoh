name: Build Commercial APK and AAB
on:
  push:
    branches:
      - "*"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Setup Node.js Environment
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Install Cordova CLI Globally
      run: npm install -g cordova

    - name: Create Native Android Project
      run: |
        cordova create build_tmp com.pharaoh.hollowgame "Hollow Pharaoh"
        cd build_tmp
        rm -rf www/*
        cp -r ../index.html www/
        cp ../config.xml .
        cordova platform add android@11.0.0

    - name: Setup Java JDK 11
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '11'

    - name: Build Both Formats (APK & AAB)
      run: |
        cd build_tmp
        cordova build android --device --release
        cordova build android --device --release -- --appBundle

    - name: Upload Testing APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: HollowPharaoh-Testing-APK
        path: build_tmp/platforms/android/app/build/outputs/apk/release/app-release-unsigned.apk

    - name: Upload Play Store AAB Artifact
      uses: actions/upload-artifact@v4
      with:
        name: HollowPharaoh-Store-AAB
        path: build_tmp/platforms/android/app/build/outputs/bundle/release/app-release-unsigned.aab
